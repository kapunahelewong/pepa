openapi: 3.1.0
info:
  title: Widgets API
  version: "1.0.0"
  description: |
    A small fictional API for managing widgets, used as a working example
    for the API Reference section of docs-platform. Swap this file out for
    your real spec once the reference renderer is wired up — everything
    downstream (page generation, nav, search indexing) should keep working
    unchanged as long as the new spec is also valid OpenAPI 3.1.
  contact:
    name: docs-platform
servers:
  - url: https://api.example.com/v1
    description: Production

security:
  - bearerAuth: []

tags:
  - name: Widgets
    description: Create, read, update, and delete widgets.

paths:
  /widgets:
    get:
      operationId: listWidgets
      tags: [Widgets]
      summary: List widgets
      description: Returns a paginated list of widgets, optionally filtered by status.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, archived]
          description: Filter widgets by status.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Maximum number of widgets to return.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque pagination cursor from a previous response's `next_cursor`.
      responses:
        "200":
          description: A page of widgets.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Widget"
                  next_cursor:
                    type: string
                    nullable: true
              example:
                data:
                  - id: "wd_1a2b3c"
                    name: "Acme Sprocket"
                    status: "active"
                    weight_grams: 142
                    created_at: "2026-05-12T09:30:00Z"
                next_cursor: null
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createWidget
      tags: [Widgets]
      summary: Create a widget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WidgetInput"
            example:
              name: "Acme Sprocket"
              weight_grams: 142
      responses:
        "201":
          description: The created widget.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Widget"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /widgets/{widgetId}:
    parameters:
      - name: widgetId
        in: path
        required: true
        schema:
          type: string
        description: The widget's unique ID, e.g. `wd_1a2b3c`.
    get:
      operationId: getWidget
      tags: [Widgets]
      summary: Get a widget
      responses:
        "200":
          description: The requested widget.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Widget"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateWidget
      tags: [Widgets]
      summary: Update a widget
      description: Partial update — only send the fields you want to change.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WidgetInput"
      responses:
        "200":
          description: The updated widget.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Widget"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteWidget
      tags: [Widgets]
      summary: Delete a widget
      responses:
        "204":
          description: Widget deleted. No content returned.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Pass your API key as a bearer token:
        `Authorization: Bearer YOUR_API_KEY`

  schemas:
    Widget:
      type: object
      required: [id, name, status, created_at]
      properties:
        id:
          type: string
          description: Unique widget ID.
          example: "wd_1a2b3c"
        name:
          type: string
          example: "Acme Sprocket"
        status:
          type: string
          enum: [active, archived]
          default: active
        weight_grams:
          type: integer
          nullable: true
          description: Optional weight in grams.
        created_at:
          type: string
          format: date-time

    WidgetInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        weight_grams:
          type: integer
          nullable: true
        status:
          type: string
          enum: [active, archived]

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message, code]
          properties:
            message:
              type: string
            code:
              type: string
            details:
              type: object
              additionalProperties: true

  responses:
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              message: "Missing or invalid Authorization header."
              code: "unauthorized"
    NotFound:
      description: The requested widget does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              message: "No widget found with that ID."
              code: "not_found"
    ValidationError:
      description: The request body failed validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              message: "`name` is required and must be a non-empty string."
              code: "validation_error"
              details:
                field: "name"
